

services:
  # 1. The PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yatha_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yatha_secret}
      POSTGRES_DB: ${POSTGRES_DB:-yatha_db}
    ports:
      - "5432:5432"
    volumes:
      - yatha_db_data:/var/lib/postgresql/data # Persists your graph data!

  # 2. The Next.js Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Automatically construct the DB URL from the variables above
      - DATABASE_URL=postgresql://${POSTGRES_USER:-yatha_user}:${POSTGRES_PASSWORD:-yatha_secret}@db:5432/${POSTGRES_DB:-yatha_db}
      
      # Cloudflare R2 / S3 Configuration for Media
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      
      # App Settings
      - NODE_ENV=production
    depends_on:
      - db

volumes:
  # This ensures your Postgres data isn't wiped when the container stops
  yatha_db_data: